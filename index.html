<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>營養追蹤器 v4.0</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
      padding-top: 100px;
      padding-bottom: 20px;
    }
    
    /* 固定營養條 */
    .nutrition-bar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      background: white;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      z-index: 1000;
      padding: 8px 12px;
    }
    
    .week-select {
      margin-bottom: 6px;
    }
    
    .week-select select {
      width: 100%;
      padding: 6px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    
    .nutrition-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 4px;
      font-size: 12px;
      line-height: 1.4;
    }
    
    .nutrition-item {
      display: flex;
      justify-content: space-between;
      padding: 2px 4px;
      background: #f8f9fa;
      border-radius: 4px;
    }
    
    .nutrition-item.remaining {
      grid-column: 1 / -1;
      color: white;
      font-weight: bold;
      font-size: 14px;
    }
    
    .nutrition-item.remaining.high {
      background: #34C759;
    }
    
    .nutrition-item.remaining.medium {
      background: #FF9500;
    }
    
    .nutrition-item.remaining.low {
      background: #FF3B30;
    }
    
    .nutrition-item.good {
      background: #d4edda;
      color: #155724;
    }
    
    .nutrition-item.warning {
      background: #fff3cd;
      color: #856404;
    }
    
    .nutrition-item.over {
      background: #ffe5e5;
      color: #d32f2f;
    }
    
    /* 餐框 */
    .meal-section {
      background: white;
      margin: 0 12px 12px 12px;
      border-radius: 12px;
      padding: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .meal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .meal-title {
      font-size: 16px;
      font-weight: bold;
      color: #333;
    }
    
    .meal-calories {
      font-size: 12px;
      color: #666;
    }
    
    .meal-btn {
      padding: 6px 16px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      min-height: 36px;
    }
    
    .btn-complete {
      background: #34C759;
      color: white;
    }
    
    .btn-edit {
      background: #007AFF;
      color: white;
    }
    
    /* 分類 */
    .category-section {
      margin-bottom: 12px;
    }
    
    .category-section:last-child {
      margin-bottom: 0;
    }
    
    /* 橫向滾動容器 */
    .categories-scroll {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin-bottom: 12px;
    }
    
    .categories-grid {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(110px, 1fr);
      gap: 8px;
      padding-bottom: 4px;
    }
    
    .category-column {
      min-width: 110px;
    }
    
    .category-title {
      font-size: 13px;
      font-weight: 600;
      color: #666;
      margin-bottom: 6px;
      padding: 6px 8px;
      background: #f8f9fa;
      border-radius: 6px;
      text-align: center;
      white-space: nowrap;
    }
    
    /* 食物列表 */
    .food-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    
    .food-item {
      padding: 6px 8px;
      border-radius: 6px;
      font-size: 12px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      user-select: none;
      position: relative;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .food-item:active {
      transform: scale(0.95);
    }
    
    .food-item.hidden {
      display: none;
    }
    
    /* 分類顏色 */
    .food-item.cat-主食 {
      background: #FF9800;
      color: white;
    }
    
    .food-item.cat-蛋白質 {
      background: #F44336;
      color: white;
    }
    
    .food-item.cat-蔬菜 {
      background: #4CAF50;
      color: white;
    }
    
    .food-item.cat-水果 {
      background: #E91E63;
      color: white;
    }
    
    .food-item.cat-堅果種子 {
      background: #795548;
      color: white;
    }
    
    .food-item.cat-湯品飲品 {
      background: #2196F3;
      color: white;
    }
    
    /* 已選中 */
    .food-item.selected {
      box-shadow: 0 0 0 3px rgba(52, 199, 89, 0.5);
      font-weight: bold;
    }
    
    .food-item.selected::before {
      content: "✓ ";
      font-weight: bold;
    }
    
    /* 推薦標記 */
    .food-item.recommended::after {
      content: "★";
      position: absolute;
      top: 2px;
      right: 4px;
      font-size: 10px;
      color: #FFD700;
    }
    
    .food-name {
      font-weight: 500;
      margin-bottom: 2px;
    }
    
    .food-calories {
      font-size: 11px;
      opacity: 0.9;
    }
    
    /* 鎖定狀態 */
    .meal-section.locked .food-list {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    
    .meal-section.locked .category-title {
      display: none;
    }
    
    .meal-section.locked .category-section {
      margin-bottom: 0;
    }
    
    /* 設定頁 */
    .page {
      display: none;
      padding: 16px;
    }
    
    .page.active {
      display: block;
    }
    
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }
    
    .header h1 {
      font-size: 24px;
      color: #333;
    }
    
    .header-btn {
      background: #007AFF;
      color: white;
      border: none;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      min-height: 44px;
    }
    
    .section {
      background: white;
      padding: 16px;
      border-radius: 12px;
      margin-bottom: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .section h2 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #333;
    }
    
    .section p {
      font-size: 14px;
      color: #666;
      margin-bottom: 12px;
    }
    
    .format-example {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      font-size: 12px;
      color: #495057;
      overflow-x: auto;
      margin-bottom: 12px;
    }
    
    textarea {
      width: 100%;
      min-height: 200px;
      padding: 12px;
      font-size: 14px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-family: 'Monaco', 'Courier New', monospace;
      resize: vertical;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      min-height: 44px;
      margin-top: 12px;
    }
    
    .btn-success {
      background: #34C759;
      color: white;
    }
    
    .error-message, .success-message {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      display: none;
    }
    
    .error-message {
      background: #FFE5E5;
      color: #D32F2F;
    }
    
    .success-message {
      background: #E8F5E9;
      color: #2E7D32;
    }
    
    .error-message.show, .success-message.show {
      display: block;
    }
  </style>
</head>
<body>
  <!-- 主頁面 -->
  <div id="mainPage" class="page active">
    <!-- 固定營養條 -->
    <div class="nutrition-bar">
      <div class="week-select">
        <select id="weekSelect" onchange="updateWeek()">
          <option value="">請先設定計畫</option>
        </select>
      </div>
      <div class="nutrition-grid" id="nutritionGrid"></div>
    </div>
    
    <!-- 餐框 -->
    <div id="mealsContainer"></div>
  </div>
  
  <!-- 計畫設定頁 -->
  <div id="planPage" class="page">
    <div class="header">
      <h1>📋 設定計畫</h1>
      <button class="header-btn" onclick="showPage('mainPage')">返回</button>
    </div>
    
    <div class="section">
      <h2>匯入週計畫</h2>
      <p>格式：週數,熱量,蛋白質,脂肪,碳水,纖維,鈉,糖,飽和脂肪</p>
      <div class="format-example">1,2000,150,60,200,25,2000,50,20</div>
      
      <div class="error-message" id="planError"></div>
      <div class="success-message" id="planSuccess"></div>
      
      <textarea id="planInput" placeholder="1,2000,150,60,200,25,2000,50,20
2,1800,140,55,180,25,1900,45,18"></textarea>
      
      <button class="btn btn-success" onclick="savePlan()">儲存計畫</button>
    </div>
  </div>
  
  <!-- 食物庫設定頁 -->
  <div id="foodPage" class="page">
    <div class="header">
      <h1>🍱 食物資訊</h1>
      <button class="header-btn" onclick="showPage('mainPage')">返回</button>
    </div>
    
    <div class="section">
      <h2>匯入食物庫</h2>
      <p>格式：分類,名稱,烹煮方式,熱量,蛋白質,脂肪,碳水,纖維,鈉,糖,飽和脂肪</p>
      <div class="format-example">主食,糙米飯,蒸煮,111,2.6,0.9,23,1.8,5,0.4,0.2</div>
      <p style="font-size: 13px; color: #999;">分類：主食、蛋白質、蔬菜、水果、堅果種子、湯品飲品</p>
      
      <div class="error-message" id="foodError"></div>
      <div class="success-message" id="foodSuccess"></div>
      
      <textarea id="foodInput" placeholder="主食,糙米飯,蒸煮,111,2.6,0.9,23,1.8,5,0.4,0.2
蛋白質,雞胸肉,水煮,165,31,3.6,0,0,74,0,1"></textarea>
      
      <button class="btn btn-success" onclick="saveFood()">儲存食物庫</button>
    </div>
  </div>

  <script>
    // Version: v4.0 - Issac - 2026-03-30
    // 全新架構：固定營養條、餐框內嵌食物選擇、智慧排序
    
    let currentWeek = 1;
    let nutritionPlan = [];
    let foodLibrary = [];
    let todayMeals = { meal1: [], meal2: [], meal3: [] };
    let mealLocked = { meal1: false, meal2: false, meal3: false };
    let foodUsageStats = {};
    
    const CATEGORIES = ['主食', '蛋白質', '蔬菜', '水果', '堅果種子', '湯品飲品'];
    const CATEGORY_ICONS = {
      '主食': '🍚',
      '蛋白質': '🥩',
      '蔬菜': '🥬',
      '水果': '🍎',
      '堅果種子': '🌰',
      '湯品飲品': '🥤'
    };
    
    // ==================== 初始化 ====================
    async function init() {
      await initDefaultData();
      await loadNutritionPlan();
      await loadFoodLibrary();
      await loadTodayMeals();
      loadFoodUsageStats();
      renderMeals();
      updateNutritionBar();
    }
    
    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      if (pageId === 'mainPage') init();
    }
    
    // ==================== 資料載入 ====================
    async function initDefaultData() {
      if (!localStorage.getItem('nutrition-plan')) {
        const defaultPlan = [];
        for (let i = 1; i <= 8; i++) defaultPlan.push({week:i,calories:2100,protein:150,fat:85,carbs:185,fiber:35,sodium:2400,sugar:25,satFat:16});
        for (let i = 9; i <= 20; i++) defaultPlan.push({week:i,calories:1900,protein:150,fat:70,carbs:150,fiber:35,sodium:2400,sugar:20,satFat:14});
        for (let i = 21; i <= 30; i++) defaultPlan.push({week:i,calories:1700,protein:145,fat:65,carbs:120,fiber:35,sodium:2400,sugar:15,satFat:12});
        localStorage.setItem('nutrition-plan', JSON.stringify(defaultPlan));
      }
      
      if (!localStorage.getItem('food-library')) {
        const defaultFoods = [
          {category:"主食",name:"糙米飯",method:"煮飯",calories:165,protein:3.75,fat:1.5,carbs:34.5,fiber:3.0,sodium:7.5,sugar:0.45,satFat:0.3},
          {category:"主食",name:"地瓜",method:"蒸煮",calories:129,protein:2.4,fat:0.15,carbs:30.0,fiber:4.5,sodium:45,sugar:6.3,satFat:0.0},
          {category:"主食",name:"燕麥粥",method:"煮粥",calories:106.5,protein:3.75,fat:2.25,carbs:18.0,fiber:2.55,sodium:3,sugar:0.0,satFat:0.45},
          {category:"蛋白質",name:"豆腐",method:"水煮",calories:105,protein:12.0,fat:6.0,carbs:3.0,fiber:1.5,sodium:7.5,sugar:0.75,satFat:0.75},
          {category:"蛋白質",name:"豆乾",method:"清炒",calories:210,protein:27.0,fat:12.0,carbs:7.5,fiber:3.75,sodium:375,sugar:1.5,satFat:1.8},
          {category:"蔬菜",name:"菠菜",method:"水煮",calories:34.5,protein:4.35,fat:0.6,carbs:5.4,fiber:3.3,sodium:118.5,sugar:0.6,satFat:0.15},
          {category:"蔬菜",name:"花椰菜",method:"水煮",calories:34.5,protein:2.7,fat:0.6,carbs:6.6,fiber:3.15,sodium:28.5,sugar:2.55,satFat:0.15},
          {category:"水果",name:"芭樂",method:"生食",calories:102,protein:3.9,fat:1.5,carbs:21.0,fiber:8.1,sodium:3,sugar:13.35,satFat:0.3},
          {category:"湯品飲品",name:"無糖綠茶",method:"沖泡",calories:1.5,protein:0.0,fat:0.0,carbs:0.45,fiber:0.0,sodium:3,sugar:0.0,satFat:0.0}
        ];
        localStorage.setItem('food-library', JSON.stringify(defaultFoods));
      }
    }
    
    async function loadNutritionPlan() {
      const data = localStorage.getItem('nutrition-plan');
      if (data) {
        nutritionPlan = JSON.parse(data);
        const select = document.getElementById('weekSelect');
        select.innerHTML = nutritionPlan.map(p => 
          `<option value="${p.week}">第 ${p.week} 週</option>`
        ).join('');
        currentWeek = nutritionPlan[0].week;
      }
    }
    
    async function loadFoodLibrary() {
      const data = localStorage.getItem('food-library');
      foodLibrary = data ? JSON.parse(data) : [];
    }
    
    async function loadTodayMeals() {
      const today = new Date().toISOString().split('T')[0];
      const data = localStorage.getItem(`meals-${today}`);
      todayMeals = data ? JSON.parse(data) : { meal1: [], meal2: [], meal3: [] };
      
      const lockData = localStorage.getItem(`meals-locked-${today}`);
      mealLocked = lockData ? JSON.parse(lockData) : { meal1: false, meal2: false, meal3: false };
    }
    
    async function saveTodayMeals() {
      const today = new Date().toISOString().split('T')[0];
      localStorage.setItem(`meals-${today}`, JSON.stringify(todayMeals));
      localStorage.setItem(`meals-locked-${today}`, JSON.stringify(mealLocked));
    }
    
    function loadFoodUsageStats() {
      const data = localStorage.getItem('food-usage-stats');
      foodUsageStats = data ? JSON.parse(data) : {};
    }
    
    function saveFoodUsageStats() {
      localStorage.setItem('food-usage-stats', JSON.stringify(foodUsageStats));
    }
    
    function updateWeek() {
      currentWeek = parseInt(document.getElementById('weekSelect').value);
      updateNutritionBar();
      renderMeals();
    }
    
    // ==================== 營養條更新 ====================
    function updateNutritionBar() {
      const plan = nutritionPlan.find(p => p.week === currentWeek);
      if (!plan) {
        document.getElementById('nutritionGrid').innerHTML = '<div style="text-align:center;color:#999;">請先設定計畫</div>';
        return;
      }
      
      const totals = calculateTotals();
      const remaining = plan.calories - totals.calories;
      
      // 剩餘熱量顏色
      let remainingClass = 'high';
      if (remaining < 200) remainingClass = 'low';
      else if (remaining < 500) remainingClass = 'medium';
      
      const items = [
        { 
          label: '剩餘', 
          value: Math.round(remaining), 
          unit: 'kcal', 
          isRemaining: true,
          colorClass: remainingClass
        }
      ];
      
      // 營養素項目
      const nutrients = [
        { label: '蛋白質', key: 'protein', target: plan.protein, unit: 'g' },
        { label: '脂肪', key: 'fat', target: plan.fat, unit: 'g' },
        { label: '碳水', key: 'carbs', target: plan.carbs, unit: 'g' },
        { label: '纖維', key: 'fiber', target: plan.fiber, unit: 'g' },
        { label: '鈉', key: 'sodium', target: plan.sodium, unit: 'mg' },
        { label: '糖', key: 'sugar', target: plan.sugar, unit: 'g' }
      ];
      
      nutrients.forEach(n => {
        const current = totals[n.key];
        const percentage = (current / n.target) * 100;
        
        let colorClass = '';
        if (percentage >= 80 && percentage <= 120) {
          colorClass = 'good';
        } else if ((percentage >= 50 && percentage < 80) || (percentage > 120 && percentage <= 150)) {
          colorClass = 'warning';
        } else {
          colorClass = 'over';
        }
        
        items.push({
          label: n.label,
          current: n.unit === 'mg' ? Math.round(current) : current.toFixed(1),
          target: n.target,
          unit: n.unit,
          colorClass
        });
      });
      
      document.getElementById('nutritionGrid').innerHTML = items.map(item => {
        if (item.isRemaining) {
          return `<div class="nutrition-item remaining ${item.colorClass}">
            <span>${item.label}</span>
            <span>${item.value} ${item.unit}</span>
          </div>`;
        }
        return `<div class="nutrition-item ${item.colorClass}">
          <span>${item.label}</span>
          <span>${item.current}/${item.target}${item.unit}</span>
        </div>`;
      }).join('');
    }
    
    function calculateTotals() {
      const totals = { calories: 0, protein: 0, fat: 0, carbs: 0, fiber: 0, sodium: 0, sugar: 0, satFat: 0 };
      ['meal1', 'meal2', 'meal3'].forEach(mealId => {
        todayMeals[mealId].forEach(food => {
          totals.calories += food.calories;
          totals.protein += food.protein;
          totals.fat += food.fat;
          totals.carbs += food.carbs;
          totals.fiber += food.fiber;
          totals.sodium += food.sodium;
          totals.sugar += food.sugar;
          totals.satFat += food.satFat;
        });
      });
      return totals;
    }
    
    // ==================== 渲染餐點 ====================
    function renderMeals() {
      const container = document.getElementById('mealsContainer');
      container.innerHTML = ['meal1', 'meal2', 'meal3'].map((mealId, index) => {
        const mealNum = index + 1;
        const foods = todayMeals[mealId];
        const locked = mealLocked[mealId];
        const mealCalories = foods.reduce((sum, f) => sum + f.calories, 0);
        
        return `
          <div class="meal-section ${locked ? 'locked' : ''}" data-meal="${mealId}">
            <div class="meal-header">
              <div>
                <div class="meal-title">第${mealNum}餐</div>
                <div class="meal-calories">${Math.round(mealCalories)} kcal</div>
              </div>
              <button class="meal-btn ${locked ? 'btn-edit' : 'btn-complete'}" 
                      onclick="${locked ? 'unlockMeal' : 'lockMeal'}('${mealId}')">
                ${locked ? '編輯' : '完成'}
              </button>
            </div>
            <div class="meal-content">
              ${renderMealFoods(mealId)}
            </div>
          </div>
        `;
      }).join('');
    }
    
    function renderMealFoods(mealId) {
      const locked = mealLocked[mealId];
      const selectedFoods = todayMeals[mealId];
      const selectedIds = new Set(selectedFoods.map(f => `${f.name}-${f.method}`));
      
      if (locked) {
        return `<div class="food-list" style="display: flex; flex-wrap: wrap; gap: 6px;">
          ${selectedFoods.map(food => 
            `<div class="food-item cat-${food.category} selected">
              <div class="food-name">${food.name}</div>
              <div class="food-calories">${food.calories}</div>
            </div>`
          ).join('')}
        </div>`;
      }
      
      const sortedFoods = getSortedFoods();
      const plan = nutritionPlan.find(p => p.week === currentWeek);
      const totals = calculateTotals();
      const remaining = plan ? plan.calories - totals.calories : 0;
      
      // 按分類分組
      const categorizedFoods = {};
      CATEGORIES.forEach(cat => {
        categorizedFoods[cat] = sortedFoods.filter(f => f.category === cat)
          .filter(f => f.calories <= remaining || selectedIds.has(`${f.name}-${f.method}`));
      });
      
      // 橫向表格排列
      return `
        <div class="categories-scroll">
          <div class="categories-grid">
            ${CATEGORIES.map(category => {
              const foods = categorizedFoods[category];
              if (foods.length === 0) return '';
              
              return `
                <div class="category-column">
                  <div class="category-title">${CATEGORY_ICONS[category]} ${category}</div>
                  <div class="food-list">
                    ${foods.map(food => {
                      const foodId = `${food.name}-${food.method}`;
                      const selected = selectedIds.has(foodId);
                      const recommended = food.isRecommended ? 'recommended' : '';
                      return `
                        <div class="food-item cat-${category} ${selected ? 'selected' : ''} ${recommended}"
                             onclick="toggleFood('${mealId}', '${foodId}')"
                             title="${food.name} ${food.calories} kcal">
                          <div class="food-name">${food.name}</div>
                          <div class="food-calories">${food.calories}</div>
                        </div>
                      `;
                    }).join('')}
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        </div>
      `;
    }
    
    // ==================== 食物排序 ====================
    function getSortedFoods() {
      const plan = nutritionPlan.find(p => p.week === currentWeek);
      if (!plan) return foodLibrary;
      
      const totals = calculateTotals();
      const deficits = {
        protein: plan.protein - totals.protein,
        fat: plan.fat - totals.fat,
        carbs: plan.carbs - totals.carbs,
        fiber: plan.fiber - totals.fiber
      };
      
      const maxDeficit = Math.max(...Object.values(deficits));
      const mostNeeded = Object.keys(deficits).find(k => deficits[k] === maxDeficit);
      
      return foodLibrary.map(food => {
        const foodId = `${food.name}-${food.method}`;
        const usageCount = foodUsageStats[foodId] || 0;
        const nutrientValue = food[mostNeeded] || 0;
        
        return {
          ...food,
          usageCount,
          nutrientValue,
          isRecommended: nutrientValue > 0 && deficits[mostNeeded] > 0
        };
      }).sort((a, b) => {
        if (a.category !== b.category) return 0;
        if (b.usageCount !== a.usageCount) return b.usageCount - a.usageCount;
        return b.nutrientValue - a.nutrientValue;
      });
    }
    
    // ==================== 食物選擇 ====================
    function toggleFood(mealId, foodId) {
      if (mealLocked[mealId]) return;
      
      const [name, method] = foodId.split('-');
      const food = foodLibrary.find(f => f.name === name && f.method === method);
      if (!food) return;
      
      const index = todayMeals[mealId].findIndex(f => `${f.name}-${f.method}` === foodId);
      
      if (index >= 0) {
        todayMeals[mealId].splice(index, 1);
      } else {
        todayMeals[mealId].push({ ...food });
        foodUsageStats[foodId] = (foodUsageStats[foodId] || 0) + 1;
        saveFoodUsageStats();
      }
      
      saveTodayMeals();
      updateNutritionBar();
      renderMeals();
    }
    
    function lockMeal(mealId) {
      mealLocked[mealId] = true;
      saveTodayMeals();
      renderMeals();
    }
    
    function unlockMeal(mealId) {
      mealLocked[mealId] = false;
      saveTodayMeals();
      renderMeals();
    }
    
    // ==================== 設定頁 ====================
    function parseCSV(text) {
      return text.trim().split('\n').map(line => 
        line.split(',').map(cell => cell.trim())
      );
    }
    
    function savePlan() {
      const input = document.getElementById('planInput').value;
      const errorDiv = document.getElementById('planError');
      const successDiv = document.getElementById('planSuccess');
      
      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');
      
      if (!input.trim()) {
        errorDiv.textContent = '請輸入資料';
        errorDiv.classList.add('show');
        return;
      }
      
      try {
        const rows = parseCSV(input);
        const planData = rows.map(row => ({
          week: parseInt(row[0]),
          calories: parseFloat(row[1]),
          protein: parseFloat(row[2]),
          fat: parseFloat(row[3]),
          carbs: parseFloat(row[4]),
          fiber: parseFloat(row[5]),
          sodium: parseFloat(row[6]),
          sugar: parseFloat(row[7]),
          satFat: parseFloat(row[8])
        }));
        
        localStorage.setItem('nutrition-plan', JSON.stringify(planData));
        
        successDiv.textContent = `✓ 成功儲存 ${planData.length} 週計畫`;
        successDiv.classList.add('show');
        
        setTimeout(() => showPage('mainPage'), 1000);
      } catch (err) {
        errorDiv.textContent = '格式錯誤：' + err.message;
        errorDiv.classList.add('show');
      }
    }
    
    function saveFood() {
      const input = document.getElementById('foodInput').value;
      const errorDiv = document.getElementById('foodError');
      const successDiv = document.getElementById('foodSuccess');
      
      errorDiv.classList.remove('show');
      successDiv.classList.remove('show');
      
      if (!input.trim()) {
        errorDiv.textContent = '請輸入資料';
        errorDiv.classList.add('show');
        return;
      }
      
      try {
        const rows = parseCSV(input);
        const foodData = rows.map(row => ({
          category: row[0],
          name: row[1],
          method: row[2],
          calories: parseFloat(row[3]),
          protein: parseFloat(row[4]),
          fat: parseFloat(row[5]),
          carbs: parseFloat(row[6]),
          fiber: parseFloat(row[7]),
          sodium: parseFloat(row[8]),
          sugar: parseFloat(row[9]),
          satFat: parseFloat(row[10])
        }));
        
        localStorage.setItem('food-library', JSON.stringify(foodData));
        
        successDiv.textContent = `✓ 成功儲存 ${foodData.length} 項食物`;
        successDiv.classList.add('show');
        
        setTimeout(() => showPage('mainPage'), 1000);
      } catch (err) {
        errorDiv.textContent = '格式錯誤：' + err.message;
        errorDiv.classList.add('show');
      }
    }
    
    // ==================== 啟動 ====================
    init();
  </script>
</body>
</html>
